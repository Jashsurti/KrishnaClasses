<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnOnline | Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(120deg,#0f172a,#020617);
  color:#e5e7eb;
}


    /* Navbar */
    nav{
      position:fixed;
      top:0;
      width:100%;
      background:rgba(2,6,23,.85);
      display:flex;
      justify-content:center;
      gap:35px;
      padding:15px;
      z-index:1000;
      backdrop-filter:blur(10px);
    }
    nav a{
      color:#e5e7eb;
      text-decoration:none;
      font-weight:500;
      position:relative;
    }
    nav a::after{
      content:'';
      position:absolute;
      width:0;
      height:2px;
      background:#3b82f6;
      left:0;
      bottom:-6px;
      transition:.3s;
    }
    nav a:hover::after{width:100%}
    
/* Header */
.header{
  padding:120px 8% 50px;
  text-align:center;
}
.header h1{
  font-size:3rem;
  color:#60a5fa;
}
.header p{
  max-width:700px;
  margin:15px auto 0;
  opacity:.9;
  font-size:1.05rem;
}

/* Contact Section */
.contact{
  padding:40px 8% 80px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

/* Info Card */
.contact-info{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  padding:35px;
  border-radius:22px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  transition:.4s;
}
.contact-info:hover{
  transform:translateY(-10px);
  border-color:#3b82f6;
}

.contact-info h2{
  color:#93c5fd;
  margin-bottom:15px;
}
.contact-info p{
  line-height:1.7;
  opacity:.9;
}

/* Form Card */
.contact-form{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  padding:35px;
  border-radius:22px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  transition:.4s;
}
.contact-form:hover{
  transform:translateY(-10px);
  border-color:#60a5fa;
}

.contact-form h2{
  color:#93c5fd;
  margin-bottom:20px;
}

/* Inputs */
input, textarea{
  width:100%;
  padding:14px;
  margin-bottom:18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(2,6,23,0.7);
  color:#e5e7eb;
  outline:none;
}
input::placeholder, textarea::placeholder{
  color:#94a3b8;
}
input:focus, textarea:focus{
  border-color:#3b82f6;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#2563eb;
  color:#fff;
  font-size:1rem;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  background:#1d4ed8;
}

/* Footer */
footer{
  background:#020617;
  text-align:center;
  padding:25px;
  color:#94a3b8;
}

/* Responsive */
@media(max-width:900px){
  .contact{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <a href="home.html">Home</a>
  <a href="courses.html">Courses</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="header">
  <h1>Contact Us</h1>
  <p>
    Have questions or need guidance?  
    Get in touch with us — we’d love to help you.
  </p>
</div>

<section class="contact">
  <div class="contact-info">
    <h2>Get In Touch</h2>
    <p>
      📍 Address: Ahmedabad, India  
      <br><br>
      📧 Email: info@learnonline.com  
      <br><br>
      📞 Phone: +91 98765 43210
    </p>
  </div>

  <div class="contact-form">
    <h2>Send a Message</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2025 LearnOnline | Contact Page</p>
</footer>

</body>
</html>
