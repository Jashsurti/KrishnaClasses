<!DOCTYPE html>
<script></script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Classes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    scroll-behavior:smooth;
}

/* HEADER */
header{
    position:sticky;top:0;z-index:1000;
    background:rgba(0,0,0,.85);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header h1{color:#f5a623}
nav a{
    color:#fff;
    margin-left:20px;
    text-decoration:none;
    font-weight:600;
}
nav a:hover{color:#f5a623}

/* HERO */
.hero{
    text-align:center;
    padding:120px 20px;
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1600&q=80')
    center/cover;
}
.hero h2{font-size:48px}
.hero p{margin:15px 0}
.btn{
    padding:15px 35px;
    border-radius:50px;
    background:#f5a623;
    color:#000;
    font-weight:700;
    text-decoration:none;
}

/* SECTION */
section{padding:70px 40px}
.section-title{
    text-align:center;
    font-size:36px;
    color:#f5a623;
    margin-bottom:40px;
}

/* COURSES */
.courses{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}
.course-card{
    background:rgba(255,255,255,.08);
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}
.course-card:hover{transform:translateY(-10px)}
.course-card img{width:100%;height:160px;object-fit:cover}
.course-info{padding:15px}
.course-info h3{color:#f5a623}

/* RESULTS */
.results{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}
.results img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}
.results img:hover{transform:scale(1.05)}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}
.modal img{max-width:90%;max-height:90%}
.modal span{
    position:absolute;
    top:20px;right:30px;
    font-size:35px;
    cursor:pointer;
}

/* CONTACT */
.contact-form{
    max-width:500px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}
.contact-form input,
.contact-form textarea{
    padding:12px;
    border-radius:8px;
    border:none;
}
.contact-form button{
    background:#f5a623;
    padding:12px;
    border:none;
    border-radius:30px;
    font-weight:bold;
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:20px;
}

/* FLOAT BUTTONS */
.call-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#28a745;
    color:#fff;
    padding:15px 20px;
    border-radius:50px;
    text-decoration:none;
}
.whatsapp-btn{
    position:fixed;
    bottom:90px;
    right:20px;
    width:60px;height:60px;
    background:#25D366;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}
.whatsapp-btn img{width:30px}

/* RESPONSIVE */
@media(max-width:768px){
.hero h2{font-size:32px}
}
</style>
</head>

<body>

<header>
<h1>Krishna Classes</h1>
<nav>
<a href="#home">Home</a>
<a href="#courses">Courses</a>
<a href="#results">Results</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<h2>Quality Education, Strong Foundation</h2>
<p>Std 5–10 | All Subjects</p>
<a href="#courses" class="btn">Explore Courses</a>
</section>

<section id="courses">
<h2 class="section-title">Our Courses</h2>
<div class="courses">

<div class="course-card">
<img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353">
<div class="course-info"><h3>English</h3></div>
</div>

<div class="course-card">
<img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d">
<div class="course-info"><h3>Science</h3></div>
</div>

<div class="course-card">
<img src="https://images.unsplash.com/photo-1509228627152-72ae9ae6848d">
<div class="course-info"><h3>Mathematics</h3></div>
</div>

</div>
</section>

<section id="results">
<h2 class="section-title">Our Results</h2>
<div class="results">
<img src="results/result1.jpg" onclick="openModal(this.src)">
<img src="results/result2.jpg" onclick="openModal(this.src)">
</div>
</section>

<section id="contact">
<h2 class="section-title">Contact Us</h2>

<form class="contact-form" onsubmit="submitForm(event)">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<input type="tel" placeholder="Phone Number" required>
<textarea rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>

</section>

<footer>
© 2025 Krishna Classes | Aniruddh Surti
</footer>

<!-- MODAL -->
<div class="modal" id="imgModal" onclick="closeModal()">
<span>&times;</span>
<img id="modalImg">
</div>

<!-- CALL BUTTON -->
<a href="tel:9427834458" class="call-btn">📞</a>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/919427834458" target="_blank" class="whatsapp-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>

// MODAL
function openModal(src){
document.getElementById('imgModal').style.display='flex';
document.getElementById('modalImg').src=src;
}
function closeModal(){
document.getElementById('imgModal').style.display='none';
}

// FORM
function submitForm(e) {
e.preventDefault();

let name = e.target[0].value;
let email = e.target[1].value;
let phone = e.target[2].value;
let message = e.target[3].value;

// WhatsApp
let text = `Hello Krishna Classes,

Name: ${name}
Email: ${email}
Phone: ${phone}
Message: ${message}`;

let url = "https://wa.me/919427834458?text=" + encodeURIComponent(text);
window.open(url, "_blank");

// MODAL (same)
function openModal(src){
document.getElementById('imgModal').style.display='flex';
document.getElementById('modalImg').src=src;
}
function closeModal(){
document.getElementById('imgModal').style.display='none';
}

// ✅ UPDATED FORM (JSON backend + WhatsApp)
async function submitForm(e){
e.preventDefault();

let name = e.target[0].value;
let email = e.target[1].value;
let phone = e.target[2].value;
let message = e.target[3].value;

let formData = { name, email, phone, message };

try {
    // ✅ Save to backend (data.json)
    await fetch("/save", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(formData)
    });

    // ✅ WhatsApp
    let text = `Hello Krishna Classes,

Name: ${name}
Email: ${email}
Phone: ${phone}
Message: ${message}`;

    let url = "https://wa.me/919427834458?text=" + encodeURIComponent(text);
    window.open(url, "_blank");

    alert("Message Sent & Saved Successfully!");

    e.target.reset();

} catch (err) {
    alert("Error saving data!");
    console.error(err);
}

}
}

</script>

</body>
</html>
